services:
  # Backend API
  - type: web
    name: readtrack-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: readtrack-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

  # Frontend
  - type: web
    name: readtrack-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          name: readtrack-api
          type: web
          property: host

databases:
  - name: readtrack-db
    plan: free
